<!doctype html>
<html lang="es">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mercadia</title>

<meta name="description" content="Pedido en línea vía WhatsApp">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/assets/css/core.css">
<link rel="stylesheet" href="/assets/css/themes.css">

</head>


<body>

<!-- Fondo animado -->
<canvas id="bgParticles"></canvas>


<!-- =========================
MENÚ PREMIUM
(se activa cuando style = store)
========================= -->

<nav class="store-nav premium-only">

<div class="store-nav-left">
<div class="menu-toggle">☰</div>
<span id="storeLogoText"></span>
</div>

<div class="store-nav-center">
<a href="#productos">Productos</a>
<a href="#contacto">Proceder al pago</a>
</div>

<div class="store-nav-right">
<button id="cartBtn" class="cart-btn">🛒 <span id="cartCount">0</span></button>
</div>

</nav>


<main class="container">


<!-- =========================
HEADER
========================= -->

<header class="header">

<div id="logoContainer"></div>

<h1 id="bizName">Cargando…</h1>

<p id="bizNote" class="muted"></p>

</header>



<!-- =========================
PRODUCTOS
========================= -->

<section class="card" id="productos">

<h2>Selecciona tus productos</h2>

<div id="productList" class="product-list"></div>


<div class="totals">

<div class="line">
<span>Subtotal</span>
<span id="subtotal">$0</span>
</div>

<div class="line">
<span>Envío</span>
<span id="shipping">$0</span>
</div>

<div class="line total">
<span>Total</span>
<span id="total">$0</span>
</div>

</div>

</section>



<!-- =========================
DATOS CLIENTE
========================= -->

<section class="card" id="contacto">

<h2>Datos de contacto</h2>


<!-- honeypot -->

<div class="hp-field">

<label for="companyWebsite">Sitio web</label>

<input
id="companyWebsite"
name="companyWebsite"
type="text"
tabindex="-1"
autocomplete="off"
/>

</div>



<div class="grid">

<div>

<label class="label">Nombre</label>

<input
id="customerName"
class="input"
type="text"
placeholder="Nombre completo"
/>

</div>


<div>

<label class="label">Teléfono</label>

<input
id="customerPhone"
class="input"
type="tel"
placeholder="10 dígitos"
maxlength="10"
/>

</div>

</div>



<!-- =========================
DIRECCIÓN
========================= -->

<div class="address-field">

<label class="label">Calle y número</label>

<input
id="street"
class="input"
type="text"
/>


<div class="grid">

<div>

<label class="label">Colonia</label>

<input
id="neighborhood"
class="input"
type="text"
/>

</div>

<div>

<label class="label">Código Postal</label>

<input
id="zip"
class="input"
type="text"
maxlength="5"
/>

</div>

</div>


<div class="grid">

<div>

<label class="label">Ciudad</label>

<input
id="city"
class="input"
type="text"
/>

</div>

<div>

<label class="label">Estado</label>

<input
id="state"
class="input"
type="text"
/>

</div>

</div>


<label class="label">Tipo de envío</label>

<select id="shippingType" class="input"></select>

</div>



<button id="sendBtn" class="btn" type="button">
Enviar pedido por WhatsApp
</button>

<p id="error" class="error"></p>

</section>



<!-- =========================
FOOTER
========================= -->

<footer class="footer">

<p class="muted small">
Este pedido se envía directamente al negocio vía WhatsApp.
</p>

<p class="muted small" id="bizFooter"></p>

</footer>


</main>

<!-- =========================
MODAL PRODUCTO
========================= -->

<div id="productModal" class="modal">

  <div class="modal-box">

    <button id="modalClose" class="modal-close">✕</button>

    <img id="modalImg" class="modal-img">

    <h2 id="modalName"></h2>

    <p id="modalPrice"></p>

    <div id="modalVariants"></div>

    <button id="modalAdd" class="btn">
      Agregar al carrito
    </button>

  </div>

</div>

<script src="/assets/app.js"></script>

</body>
</html>
